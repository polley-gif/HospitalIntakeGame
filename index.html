<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Vincent's Hospital - Nurse Portal</title>
    <style>
        :root {
            --primary: #2a9d8f;
            --secondary: #e76f51;
            --bg: #f0f4f8;
            --white: #ffffff;
            --error-bg: #fff5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 10px solid var(--primary);
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 25px; font-style: italic; }

        .form-group { margin-bottom: 20px; padding: 10px; border-radius: 8px; transition: background 0.3s; }
        label.main-label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }

        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        /* Highlight for incorrect fields */
        .invalid-field {
            background-color: var(--error-bg);
            border: 2px solid var(--secondary);
        }

        .radio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
        }

        .radio-item { 
            display: flex; 
            align-items: center; 
            font-size: 14px; 
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .radio-item:hover { background: #edf2f1; }
        .radio-item input { margin-right: 8px; cursor: pointer; }

        /* Visual State for checked radio buttons */
        .radio-item.selected {
            background-color: #e2eceb;
            border-color: var(--primary);
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover { background-color: #21867a; }

        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-weight: bold;
            line-height: 1.4;
        }

        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏥 A&E Injury Report</h1>
    <p class="subtitle">Patient Intake Form (April 2024)</p>

    <form id="medicalForm">
        <div class="form-group" id="group-name">
            <label class="main-label" for="name">Patient Name (1):</label>
            <select id="name" required onchange="clearValidation()">
                <option value="">-- Select Student --</option>
                <option value="Alan TO">Alan TO</option>
                <option value="Tom CHAN">Tom CHAN</option>
                <option value="Mary HO">Mary HO</option>
                <option value="Helen CHEUNG">Helen CHEUNG</option>
                <option value="Simon WHITE">Simon WHITE</option>
                <option value="Alex WANG">Alex WANG</option>
                <option value="Tina GREEN">Tina GREEN</option>
            </select>
        </div>

        <div class="form-group" id="group-injury">
            <label class="main-label">Injury (2):</label>
            <div class="radio-grid">
                <label class="radio-item"><input type="radio" name="injury" value="broken arm"> 💪 Broken arm</label>
                <label class="radio-item"><input type="radio" name="injury" value="broken leg"> 🦵 Broken leg</label>
                <label class="radio-item"><input type="radio" name="injury" value="cut"> 🩹 Cut</label>
                <label class="radio-item"><input type="radio" name="injury" value="sting"> 🐝 Sting</label>
                <label class="radio-item"><input type="radio" name="injury" value="bruise"> 🟣 Bruise</label>
                <label class="radio-item"><input type="radio" name="injury" value="burn"> 🔥 Burn</label>
                <label class="radio-item"><input type="radio" name="injury" value="twisted ankle"> 🦶 Twisted ankle</label>
            </div>
        </div>

        <div class="form-group" id="group-day">
            <label class="main-label" for="day">Day of injury (3):</label>
            <select id="day" required>
                <option value="">-- Select Day --</option>
                <option value="01">1st April 2024</option>
                <option value="02">2nd April 2024</option>
                <option value="03">3rd April 2024</option>
            </select>
        </div>

        <div class="form-group" id="group-place">
            <label class="main-label" for="place">Place injured (4):</label>
            <select id="place" required>
                <option value="">-- Select Location --</option>
                <option value="home">🏠 Home</option>
                <option value="school">🏫 School</option>
                <option value="work">🏢 Work</option>
                <option value="park">🌳 Park</option>
                <option value="beach">🏖️ Beach</option>
                <option value="other">📍 Other</option>
            </select>
        </div>

        <div class="form-group" id="group-treatment">
            <label class="main-label">Suggested treatment (5):</label>
            <div class="radio-grid">
                <label class="radio-item"><input type="radio" name="treatment" value="plaster"> Plaster</label>
                <label class="radio-item"><input type="radio" name="treatment" value="bandage"> Bandage</label>
                <label class="radio-item"><input type="radio" name="treatment" value="cream/ointment"> Cream/Ointment</label>
            </div>
        </div>

        <div class="form-group" id="group-action">
            <label class="main-label">Action taken (6):</label>
            <div class="radio-grid">
                <label class="radio-item"><input type="radio" name="action" value="send home"> Send home</label>
                <label class="radio-item"><input type="radio" name="action" value="keep in hospital"> Keep in hospital</label>
            </div>
        </div>

        <button type="button" onclick="verifyForm()">SUBMIT REPORT</button>
    </form>

    <div id="message"></div>
</div>

<script>
    const answerSets = {
        "Alex WANG": { injury: "broken arm", day: "03", place: "school", treatment: "bandage", action: "keep in hospital" },
        "Tina GREEN": { injury: "broken leg", day: "02", place: "work", treatment: "bandage", action: "keep in hospital" },
        "Alan TO": { injury: "cut", day: "01", place: "home", treatment: "plaster", action: "send home" },
        "Tom CHAN": { injury: "sting", day: "03", place: "park", treatment: "cream/ointment", action: "send home" },
        "Mary HO": { injury: "bruise", day: "03", place: "other", treatment: "cream/ointment", action: "send home" },
        "Helen CHEUNG": { injury: "burn", day: "03", place: "beach", treatment: "cream/ointment", action: "send home" },
        "Simon WHITE": { injury: "twisted ankle", day: "02", place: "other", treatment: "bandage", action: "keep in hospital" }
    };

    // UI Enhancement: Toggle 'selected' class for radio buttons
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const name = this.getAttribute('name');
            document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
                r.parentElement.classList.remove('selected');
            });
            if (this.checked) {
                this.parentElement.classList.add('selected');
            }
        });
    });

    function clearValidation() {
        document.querySelectorAll('.form-group').forEach(el => el.classList.remove('invalid-field'));
        document.getElementById('message').style.display = 'none';
    }

    function verifyForm() {
        clearValidation();
        
        const name = document.getElementById('name').value;
        const injury = document.querySelector('input[name="injury"]:checked')?.value;
        const day = document.getElementById('day').value;
        const place = document.getElementById('place').value;
        const treatment = document.querySelector('input[name="treatment"]:checked')?.value;
        const action = document.querySelector('input[name="action"]:checked')?.value;

        if (!name || !injury || !day || !place || !treatment || !action) {
            showMessage("⚠️ Please fill in all sections before submitting.", "error");
            return;
        }

        const correct = answerSets[name];
        let errors = [];

        // Track and highlight specific errors
        if (injury !== correct.injury) { errors.push("Injury"); document.getElementById('group-injury').classList.add('invalid-field'); }
        if (day !== correct.day) { errors.push("Date"); document.getElementById('group-day').classList.add('invalid-field'); }
        if (place !== correct.place) { errors.push("Location"); document.getElementById('group-place').classList.add('invalid-field'); }
        if (treatment !== correct.treatment) { errors.push("Treatment"); document.getElementById('group-treatment').classList.add('invalid-field'); }
        if (action !== correct.action) { errors.push("Action"); document.getElementById('group-action').classList.add('invalid-field'); }

        if (errors.length === 0) {
            showMessage("✅ Correct! The medical report for " + name + " is accurate.", "success");
        } else {
            showMessage("❌ Error in sections: " + errors.join(", ") + ".<br>Please check your notes and correct the highlighted fields.", "error");
        }
    }

    function showMessage(text, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerHTML = text;
        msgDiv.className = type;
        msgDiv.style.display = 'block';
    }
</script>

</body>
</html>
