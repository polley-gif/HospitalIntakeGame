<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Vincent's Hospital - Nurse Portal</title>
    <style>
        :root {
            --primary: #2a9d8f;
            --secondary: #e76f51;
            --bg: #f0f4f8;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 10px solid var(--primary);
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 25px; font-style: italic; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }

        select, input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .radio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
        }

        .radio-item { display: flex; align-items: center; font-size: 14px; }
        .radio-item input { margin-right: 8px; }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #21867a; }

        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-weight: bold;
        }

        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏥 A&E Injury Report</h1>
    <p class="subtitle">Patient Intake Form (02/04/2026)</p>

    <form id="medicalForm">
        <div class="form-group">
            <label for="name">Patient Name (1):</label>
            <select id="name" required>
                <option value="">-- Select Student --</option>
                <option value="Alan TO">Alan TO</option>
                <option value="Tom CHAN">Tom CHAN</option>
                <option value="Mary HO">Mary HO</option>
                <option value="Helen CHEUNG">Helen CHEUNG</option>
                <option value="Simon WHITE">Simon WHITE</option>
                <option value="Alex WANG">Alex WANG</option>
                <option value="Tina GREEN">Tina GREEN</option>
            </select>
        </div>

        <div class="form-group">
            <label>Injury (2):</label>
            <div class="radio-grid">
                <div class="radio-item"><input type="radio" name="injury" value="broken arm"> broken arm</div>
                <div class="radio-item"><input type="radio" name="injury" value="broken leg"> broken leg</div>
                <div class="radio-item"><input type="radio" name="injury" value="cut"> cut</div>
                <div class="radio-item"><input type="radio" name="injury" value="sting"> sting</div>
                <div class="radio-item"><input type="radio" name="injury" value="bruise"> bruise</div>
                <div class="radio-item"><input type="radio" name="injury" value="burn"> burn</div>
                <div class="radio-item"><input type="radio" name="injury" value="twisted ankle"> twisted ankle</div>
            </div>
        </div>

        <div class="form-group">
            <label for="date">Date of injury (3):</label>
            <input type="date" id="date" value="2024-04-01" min="2024-04-01" max="2024-04-30">
            <small style="color: #666;">Note: Month and year are fixed to April 2024.</small>
        </div>

        <div class="form-group">
            <label for="place">Place injured (4):</label>
            <select id="place" required>
                <option value="">-- Select Location --</option>
                <option value="home">home</option>
                <option value="school">school</option>
                <option value="work">work</option>
                <option value="park">park</option>
                <option value="beach">beach</option>
                <option value="other">other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Suggested treatment (5):</label>
            <div class="radio-grid">
                <div class="radio-item"><input type="radio" name="treatment" value="plaster"> plaster</div>
                <div class="radio-item"><input type="radio" name="treatment" value="bandage"> bandage</div>
                <div class="radio-item"><input type="radio" name="treatment" value="cream/ointment"> cream/ointment</div>
            </div>
        </div>

        <div class="form-group">
            <label>Action taken (6):</label>
            <div class="radio-grid">
                <div class="radio-item"><input type="radio" name="action" value="send home"> send home</div>
                <div class="radio-item"><input type="radio" name="action" value="keep in hospital"> keep in hospital</div>
            </div>
        </div>

        <button type="button" onclick="verifyForm()">SUBMIT REPORT</button>
    </form>

    <div id="message"></div>
</div>

<script>
    // Master database of correct answer sets
    const answerSets = {
        "Alex WANG": { injury: "broken arm", day: "03", place: "school", treatment: "bandage", action: "keep in hospital" },
        "Tina GREEN": { injury: "broken leg", day: "02", place: "work", treatment: "bandage", action: "keep in hospital" },
        "Alan TO": { injury: "cut", day: "01", place: "home", treatment: "plaster", action: "send home" },
        "Tom CHAN": { injury: "sting", day: "03", place: "park", treatment: "cream/ointment", action: "send home" },
        "Mary HO": { injury: "bruise", day: "03", place: "other", treatment: "cream/ointment", action: "send home" },
        "Helen CHEUNG": { injury: "burn", day: "03", place: "beach", treatment: "plaster", action: "send home" },
        "Simon WHITE": { injury: "twisted ankle", day: "02", place: "other", treatment: "bandage", action: "keep in hospital" }
    };

    function verifyForm() {
        const name = document.getElementById('name').value;
        const injury = document.querySelector('input[name="injury"]:checked')?.value;
        const dateVal = document.getElementById('date').value; // YYYY-MM-DD
        const place = document.getElementById('place').value;
        const treatment = document.querySelector('input[name="treatment"]:checked')?.value;
        const action = document.querySelector('input[name="action"]:checked')?.value;
        const msgDiv = document.getElementById('message');

        // Check if all fields are filled
        if (!name || !injury || !dateVal || !place || !treatment || !action) {
            showMessage("Please fill in all sections of the report!", "error");
            return;
        }

        const day = dateVal.split('-')[2]; // Extract DD
        const correctSet = answerSets[name];

        // Validation Logic
        if (correctSet && 
            injury === correctSet.injury && 
            day === correctSet.day && 
            place === correctSet.place && 
            treatment === correctSet.treatment && 
            action === correctSet.action) {
            showMessage("✅ Correct! The medical report is accurate.", "success");
        } else {
            showMessage("❌ Incorrect. Check your notes and try again.", "error");
        }
    }

    function showMessage(text, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = text;
        msgDiv.className = type;
        msgDiv.style.display = 'block';
    }

    // Lock the month/year of the date picker
    document.getElementById('date').addEventListener('change', function(e) {
        let val = e.target.value;
        if (!val.startsWith('2024-04')) {
            // Force back to April 2024 if they try to change it via keyboard
            const day = val.split('-')[2] || "01";
            e.target.value = `2024-04-${day}`;
        }
    });
</script>

</body>
</html>
